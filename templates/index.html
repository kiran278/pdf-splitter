<!DOCTYPE html>
<html>
<head>
    <title>PDF Split & Rename</title>
</head>
<body style="font-family: Arial; padding: 40px;">

    <form action="/process" method="POST" enctype="multipart/form-data">

        <button type="submit">Process</button>

    </form>

</body>
</html>
